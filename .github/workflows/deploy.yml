name: Routsky Auto-Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/tanercamm0/routsky
            git config --global --add safe.directory /home/tanercamm0/routsky
            
            # Kilitli dosyaları temizle ve güncelle
            rm -f .git/index.lock
            git reset --hard HEAD
            git pull origin main
            
            # Docker komutlarını artık sudo olmadan çalıştırıyoruz
            docker compose -f docker-compose.staging.yml down --remove-orphans
            docker compose -f docker-compose.staging.yml build --no-cache
            docker compose -f docker-compose.staging.yml up -d --force-recreate
            
            sleep 5
            docker cp nginx/conf.d/default.conf routsky_staging_proxy:/etc/nginx/conf.d/default.conf
            docker exec routsky_staging_proxy nginx -s reload