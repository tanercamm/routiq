services:
  # ── PostgreSQL 17 ──
  db:
    image: postgres:17
    container_name: routsky_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: SecurePass123!
      POSTGRES_DB: routsky_db
    ports:
      - "5433:5432"
    volumes:
      - routsky-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── .NET API ──
  api:
    build:
      context: ./Routsky.Api
      dockerfile: Dockerfile
    image: routsky-api
    container_name: routsky_api
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=routsky_db;Username=postgres;Password=SecurePass123!;Include Error Detail=true
      Gemini__ApiKey: ${GEMINI_API_KEY:?GEMINI_API_KEY must be set in .env}
      Jwt__Key: ${JWT_KEY:-SuperSecretKeyForDevelopmentOnly123!}
    volumes:
      - routsky-uploads:/app/wwwroot/uploads
    ports:
      - "5107:8080"
    depends_on:
      db:
        condition: service_healthy

  # ── React + Nginx ──
  web:
    build:
      context: ./Routsky.Web
      dockerfile: Dockerfile
    image: routsky-web
    container_name: routsky_web
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  routsky-data:
  routsky-uploads:
